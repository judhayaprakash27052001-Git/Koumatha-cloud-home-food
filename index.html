<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Koumatha Home Cloud Kitchen | Daily Menu</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <style>
    :root {
      --bg: #0b1020;
      --surface: #121a30;
      --surface-2: #1a2442;
      --card: #202f57;
      --text: #e7ecff;
      --muted: #9fb1de;
      --accent: #7c4dff;
      --accent-2: #2dd4bf;
      --accent-3: #f59e0b;
      --danger: #fb7185;
      --ok: #34d399;
      --radius: 18px;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 5%, #25376a 0%, var(--bg) 50%);
      color: var(--text);
    }

    .shell { max-width: 1080px; margin: 0 auto; padding: 16px 16px 48px; }

    .hero {
      background: linear-gradient(120deg, rgba(124, 77, 255, 0.35), rgba(45, 212, 191, 0.25));
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 16px;
    }
    .hero h1 { margin: 0; font-size: clamp(1.5rem, 2.5vw, 2.4rem); }
    .hero p { margin: 8px 0 0; color: var(--muted); }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: 1.1fr .9fr;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: linear-gradient(180deg, rgba(32,47,87,.9), rgba(18,26,48,.95));
      border: 1px solid rgba(255,255,255,.1);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .title-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 12px; }
    .title-row h2 { margin: 0; font-size: 1.2rem; }

    .customer-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (max-width: 620px) { .customer-form { grid-template-columns: 1fr; } }

    input, textarea, select, button {
      font: inherit;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.15);
      color: var(--text);
      background: var(--surface-2);
      padding: 11px 12px;
    }

    input::placeholder, textarea::placeholder { color: #8ea2d4; }

    .location-wrap {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      grid-column: 1 / -1;
    }
    @media (max-width: 740px) { .location-wrap { grid-template-columns: 1fr; } }

    .btn {
      border: none;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #5b7cfa);
      color: #fff;
      transition: .15s transform ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn.alt { background: linear-gradient(135deg, #0ea5e9, var(--accent-2)); }
    .btn.warn { background: linear-gradient(135deg, #f59e0b, #fb7185); }

    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin: 12px 0; }
    .toolbar input[type='search'] { flex: 1 1 180px; }

    details {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px;
      background: rgba(12, 19, 37, .6);
      margin-bottom: 10px;
    }

    summary { cursor: pointer; font-weight: 700; color: #d9e2ff; }

    .items {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
    @media (max-width: 680px) { .items { grid-template-columns: 1fr; } }

    .item {
      display: grid;
      grid-template-columns: auto 1fr auto auto;
      align-items: center;
      gap: 8px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 12px;
      background: rgba(255,255,255,.03);
    }
    .price { color: #ffd166; font-weight: 700; }
    .qty { width: 64px; text-align: center; }

    .summary p { margin: 8px 0; color: var(--muted); }
    .line { display: flex; justify-content: space-between; gap: 10px; padding: 7px 0; border-bottom: 1px dashed rgba(255,255,255,.15); }

    .pay {
      margin-top: 10px;
      background: rgba(45,212,191,.08);
      border: 1px solid rgba(45,212,191,.35);
      border-radius: 12px;
      padding: 12px;
    }

    .pay-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    @media (max-width: 620px) { .pay-grid { grid-template-columns: 1fr; } }

    .error { color: var(--danger); font-size: .88rem; min-height: 18px; }
    .ok { color: var(--ok); font-size: .9rem; min-height: 20px; }

    .sticky-actions { position: sticky; bottom: 10px; margin-top: 12px; display: grid; gap: 8px; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5,8,16,.75);
      display: none;
      z-index: 1000;
      place-items: center;
      padding: 12px;
    }
    .overlay.show { display: grid; }

    .modal {
      width: min(760px, 100%);
      background: var(--surface);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      overflow: hidden;
    }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,.1); }
    #map { height: 320px; }

    .success {
      display: none;
      margin-top: 12px;
      background: rgba(52, 211, 153, .1);
      border: 1px solid rgba(52,211,153,.4);
      border-radius: 12px;
      padding: 12px;
    }
    .success.show { display: block; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>☁️ Koumatha Home Cloud Kitchen</h1>
      <p>Daily menu • fresh home-style food • quick order with auto-location & payment options.</p>
    </section>

    <div class="grid">
      <section class="panel">
        <div class="title-row"><h2>Customer & Daily Menu</h2><span>Today only</span></div>

        <form id="orderForm" novalidate>
          <div class="customer-form">
            <input id="name" type="text" placeholder="Customer full name" required />
            <input id="phone" type="tel" placeholder="Mobile number" required pattern="[0-9]{10}" />

            <div class="location-wrap">
              <input id="mapLink" type="url" placeholder="Map link auto-filled from current device location" required />
              <button class="btn alt" type="button" id="useCurrentLocation">Use Location</button>
              <button class="btn" type="button" id="chooseOnMap">Choose on Map</button>
            </div>
            <input id="lat" type="hidden" />
            <input id="lng" type="hidden" />
          </div>
          <div class="error" id="formError"></div>

          <div class="toolbar">
            <input id="search" type="search" placeholder="Search menu item" />
            <label><input type="checkbox" id="selectedOnly" /> selected only</label>
          </div>

          <div id="menuRoot"></div>

          <textarea id="notes" rows="3" placeholder="Special instructions (optional)"></textarea>
        </form>
      </section>

      <aside class="panel summary">
        <div class="title-row"><h2>Order & Payment</h2><span id="itemCount">0 items</span></div>
        <p>Review your order before placing.</p>
        <div class="line"><span>Subtotal</span><strong id="subtotal">₹0</strong></div>
        <div class="line"><span>Delivery</span><strong id="delivery">₹30</strong></div>
        <div class="line"><span>Total</span><strong id="total">₹30</strong></div>

        <div class="pay">
          <h3 style="margin:0 0 8px">Payment</h3>
          <div class="pay-grid">
            <select id="paymentMethod">
              <option value="UPI">UPI</option>
              <option value="Cash on Delivery">Cash on Delivery</option>
              <option value="Card on Delivery">Card on Delivery</option>
            </select>
            <input id="budget" type="number" min="0" placeholder="Budget (optional)" />
          </div>
          <div class="ok" id="budgetMsg"></div>
          <img alt="UPI QR" src="https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=upi%3A%2F%2Fpay%3Fpa%3D8838739815%2540ptaxis%26pn%3DKoumatha%26tn%3DFoodOrder" style="margin-top:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);"/>
        </div>

        <div class="sticky-actions">
          <button class="btn warn" id="copySummary" type="button">Copy Order</button>
          <button class="btn" id="placeOrder" type="button">Place Order</button>
        </div>
        <div class="success" id="successMsg"></div>
      </aside>
    </div>
  </div>

  <div class="overlay" id="mapOverlay" aria-hidden="true">
    <div class="modal">
      <div class="modal-head">
        <strong>Select delivery location</strong>
        <button class="btn warn" id="closeMap" type="button">Close</button>
      </div>
      <div id="map"></div>
      <div style="padding:12px;display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn alt" id="mapCurrent" type="button">Use Current Location</button>
        <button class="btn" id="confirmMap" type="button">Confirm Location</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const MENU = {
      "Breakfast": [
        ["Idly", 10], ["Dosa", 20], ["Pongal", 50], ["Poori", 20], ["Vadai", 10]
      ],
      "Lunch": [
        ["Meals", 90], ["Chicken Biryani", 140], ["Veg Fried Rice", 90], ["Curd Rice", 60]
      ],
      "Snacks": [
        ["Samosa", 20], ["Onion Bajji", 10], ["Bread Omelette", 40], ["Tea", 10], ["Coffee", 15]
      ],
      "Dinner": [
        ["Chapathi", 20], ["Parotta", 25], ["Egg Kothu", 80], ["Veg Noodles", 90]
      ]
    };

    const state = {
      selected: new Map(),
      map: null,
      marker: null,
      selectedLatLng: null
    };

    const menuRoot = document.getElementById('menuRoot');

    function buildMenu() {
      menuRoot.innerHTML = '';
      Object.entries(MENU).forEach(([section, items]) => {
        const details = document.createElement('details');
        details.open = false;
        const summary = document.createElement('summary');
        summary.textContent = section + ' (Daily Menu)';
        details.appendChild(summary);

        const wrap = document.createElement('div');
        wrap.className = 'items';

        items.forEach(([name, price]) => {
          const key = `${section}:${name}`;
          const row = document.createElement('div');
          row.className = 'item';
          row.dataset.name = name.toLowerCase();

          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.id = key;

          const label = document.createElement('label');
          label.setAttribute('for', key);
          label.textContent = name;

          const amount = document.createElement('span');
          amount.className = 'price';
          amount.textContent = `₹${price}`;

          const qty = document.createElement('input');
          qty.className = 'qty';
          qty.type = 'number';
          qty.min = '1';
          qty.value = '1';
          qty.disabled = true;

          cb.addEventListener('change', () => {
            qty.disabled = !cb.checked;
            if (cb.checked) {
              state.selected.set(key, { section, name, price, qty: Number(qty.value) });
            } else {
              state.selected.delete(key);
            }
            updateTotals();
            applyFilters();
          });

          qty.addEventListener('input', () => {
            const current = state.selected.get(key);
            if (current) {
              current.qty = Math.max(1, Number(qty.value || 1));
              qty.value = String(current.qty);
              updateTotals();
            }
          });

          row.append(cb, label, amount, qty);
          wrap.appendChild(row);
        });

        details.appendChild(wrap);
        menuRoot.appendChild(details);
      });
    }

    function updateTotals() {
      const subtotal = [...state.selected.values()].reduce((sum, item) => sum + item.price * item.qty, 0);
      const delivery = subtotal > 0 ? 30 : 0;
      const total = subtotal + delivery;
      document.getElementById('itemCount').textContent = `${state.selected.size} items`;
      document.getElementById('subtotal').textContent = `₹${subtotal}`;
      document.getElementById('delivery').textContent = `₹${delivery}`;
      document.getElementById('total').textContent = `₹${total}`;

      const budget = Number(document.getElementById('budget').value || 0);
      const msg = document.getElementById('budgetMsg');
      if (budget > 0) {
        msg.textContent = total <= budget ? '✅ Total is within your budget.' : `⚠️ Over budget by ₹${total - budget}`;
      } else {
        msg.textContent = '';
      }
    }

    function mapToLink(lat, lng) {
      return `https://www.google.com/maps?q=${lat.toFixed(6)},${lng.toFixed(6)}`;
    }

    function fillLocation(lat, lng) {
      document.getElementById('lat').value = lat.toFixed(6);
      document.getElementById('lng').value = lng.toFixed(6);
      document.getElementById('mapLink').value = mapToLink(lat, lng);
    }

    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error('Geolocation is not supported in this browser.'));
          return;
        }
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
          err => reject(new Error(err.message || 'Unable to access location.')),
          { enableHighAccuracy: true, timeout: 12000 }
        );
      });
    }

    async function autoFillCurrentLocation() {
      const errEl = document.getElementById('formError');
      errEl.textContent = '';
      try {
        const coords = await getCurrentLocation();
        fillLocation(coords.lat, coords.lng);
        if (state.marker && state.map) {
          state.marker.setLatLng([coords.lat, coords.lng]);
          state.map.setView([coords.lat, coords.lng], 16);
          state.selectedLatLng = { lat: coords.lat, lng: coords.lng };
        }
      } catch (err) {
        errEl.textContent = `Location error: ${err.message}`;
      }
    }

    function validateOrder() {
      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const mapLink = document.getElementById('mapLink').value.trim();
      const error = document.getElementById('formError');
      error.textContent = '';

      if (!name) return 'Please enter your full name.';
      if (!/^\d{10}$/.test(phone)) return 'Please enter a valid 10-digit mobile number.';
      if (!mapLink) return 'Please click "Use Location" to auto-fill your current location.';
      if (state.selected.size === 0) return 'Please select at least one daily menu item.';
      return '';
    }

    function orderSummaryText() {
      const totalText = document.getElementById('total').textContent;
      const items = [...state.selected.values()].map(i => `- ${i.name} x${i.qty} = ₹${i.qty * i.price}`).join('\n');
      return `Koumatha Home Cloud Kitchen - Daily Menu\nName: ${document.getElementById('name').value.trim()}\nPhone: ${document.getElementById('phone').value.trim()}\nLocation: ${document.getElementById('mapLink').value.trim()}\nPayment: ${document.getElementById('paymentMethod').value}\n\nItems:\n${items}\n\n${totalText}`;
    }

    function applyFilters() {
      const q = document.getElementById('search').value.toLowerCase().trim();
      const selectedOnly = document.getElementById('selectedOnly').checked;

      document.querySelectorAll('.item').forEach(el => {
        const checked = el.querySelector('input[type="checkbox"]').checked;
        const match = !q || el.dataset.name.includes(q);
        const visible = match && (!selectedOnly || checked);
        el.style.display = visible ? 'grid' : 'none';
      });
    }

    function openMap() {
      document.getElementById('mapOverlay').classList.add('show');
      if (!state.map) {
        state.map = L.map('map').setView([11.0168, 76.9558], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(state.map);
        state.map.on('click', e => {
          state.selectedLatLng = e.latlng;
          if (state.marker) state.marker.setLatLng(e.latlng);
          else state.marker = L.marker(e.latlng).addTo(state.map);
        });
      }
      setTimeout(() => state.map.invalidateSize(), 120);
    }

    function closeMap() { document.getElementById('mapOverlay').classList.remove('show'); }

    async function init() {
      buildMenu();
      updateTotals();

      document.getElementById('budget').addEventListener('input', updateTotals);
      document.getElementById('search').addEventListener('input', applyFilters);
      document.getElementById('selectedOnly').addEventListener('change', applyFilters);

      document.getElementById('useCurrentLocation').addEventListener('click', autoFillCurrentLocation);
      document.getElementById('chooseOnMap').addEventListener('click', openMap);
      document.getElementById('closeMap').addEventListener('click', closeMap);
      document.getElementById('mapOverlay').addEventListener('click', e => { if (e.target.id === 'mapOverlay') closeMap(); });

      document.getElementById('mapCurrent').addEventListener('click', async () => {
        try {
          const { lat, lng } = await getCurrentLocation();
          state.selectedLatLng = { lat, lng };
          if (!state.marker) state.marker = L.marker([lat, lng]).addTo(state.map);
          else state.marker.setLatLng([lat, lng]);
          state.map.setView([lat, lng], 16);
        } catch (err) {
          document.getElementById('formError').textContent = `Location error: ${err.message}`;
        }
      });

      document.getElementById('confirmMap').addEventListener('click', () => {
        if (!state.selectedLatLng) {
          document.getElementById('formError').textContent = 'Please pick a location on map or use current location.';
          return;
        }
        fillLocation(state.selectedLatLng.lat, state.selectedLatLng.lng);
        closeMap();
      });

      document.getElementById('copySummary').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(orderSummaryText());
          document.getElementById('successMsg').className = 'success show';
          document.getElementById('successMsg').textContent = 'Order summary copied. You can paste it to WhatsApp.';
        } catch {
          document.getElementById('formError').textContent = 'Could not copy automatically. Please copy manually.';
        }
      });

      document.getElementById('placeOrder').addEventListener('click', () => {
        const err = validateOrder();
        if (err) {
          document.getElementById('formError').textContent = err;
          return;
        }
        const success = document.getElementById('successMsg');
        success.className = 'success show';
        success.innerHTML = `✅ Order placed successfully. Please complete payment using <strong>${document.getElementById('paymentMethod').value}</strong>.`;
      });
    }

    init();
  </script>
</body>
</html>
