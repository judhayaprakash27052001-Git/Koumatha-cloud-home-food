<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-labelledby="title desc">
  <title id="title">Koumatha Cloud Home Kitchen logo</title>
  <desc id="desc">Circular green logo with brand text and pot icon</desc>
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6b7f22"/>
      <stop offset="1" stop-color="#3d5415"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffde8"/>
      <stop offset="1" stop-color="#f9f1cd"/>
    </linearGradient>
  </defs>
  <circle cx="120" cy="120" r="116" fill="url(#ring)"/>
  <circle cx="120" cy="120" r="98" fill="#c4ce82"/>
  <circle cx="120" cy="120" r="89" fill="url(#core)" stroke="#718226" stroke-width="4"/>
  <circle cx="120" cy="126" r="41" fill="#f5f9da" stroke="#718226" stroke-width="4"/>
  <text x="120" y="72" text-anchor="middle" font-size="16" font-family="Georgia, serif" font-weight="700" fill="#24310f">KOUMATHA CLOUD</text>
  <text x="120" y="184" text-anchor="middle" font-size="16" font-family="Georgia, serif" font-weight="700" fill="#24310f">HOME KITCHEN</text>
  <text x="120" y="138" text-anchor="middle" font-size="42">🍲</text>
</svg>
